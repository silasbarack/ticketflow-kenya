<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1080">
  <defs>
    <linearGradient id="topScrim" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#000000" stop-opacity="0.55"/>
      <stop offset="1" stop-color="#000000" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="botScrim" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#000000" stop-opacity="0"/>
      <stop offset="0.5" stop-color="#000000" stop-opacity="0.7"/>
      <stop offset="1" stop-color="#000000" stop-opacity="0.9"/>
    </linearGradient>
    <clipPath id="frame"><rect x="0" y="0" width="1080" height="1080"/></clipPath>
  </defs>

  <g clip-path="url(#frame)">
    <image href="https://upload.wikimedia.org/wikipedia/commons/thumb/0/0a/People_bathing_as_viewed_from_Nyali_Beach_next_to_Mombasa_Beach_Hotel_during_low_tide_and_still_conditions_in_Mombasa%2C_Kenya.jpg/1280px-People_bathing_as_viewed_from_Nyali_Beach_next_to_Mombasa_Beach_Hotel_during_low_tide_and_still_conditions_in_Mombasa%2C_Kenya.jpg"
           x="-460" y="-40" width="2000" height="1120" preserveAspectRatio="xMidYMid slice"/>
  </g>

  <rect width="1080" height="230" fill="url(#topScrim)"/>
  <rect y="470" width="1080" height="610" fill="url(#botScrim)"/>

  <!-- Category tag -->
  <rect x="60" y="56" width="230" height="56" rx="28" fill="#ffffff" opacity="0.2"/>
  <text x="175" y="93" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="700" letter-spacing="3" fill="#fef08a" text-anchor="middle">BEACH &amp; SPORTS</text>

  <!-- Title -->
  <text x="540" y="800" font-family="Arial, Helvetica, sans-serif" font-size="76" font-weight="900" fill="#ffffff" text-anchor="middle">SPORTS</text>
  <text x="540" y="850" font-family="Arial, Helvetica, sans-serif" font-size="28" font-weight="500" fill="#dff5f0" text-anchor="middle">Kenya</text>

  <!-- Bottom brand bar -->
  <rect y="970" width="1080" height="110" fill="#be123c"/>
  <text x="60" y="1015" font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="700" letter-spacing="1" fill="#ffffff" opacity="0.85">TICKETS &amp; ENTRY</text>
  <text x="60" y="1048" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="700" fill="#ffffff">Book online now</text>

  <rect x="760" y="985" width="260" height="80" rx="14" fill="#ffffff"/>
  <image href="https://ticketflow-frontend-w47s.onrender.com/logo.png" x="772" y="993" width="236" height="64" preserveAspectRatio="xMidYMid meet"/>
</svg>
