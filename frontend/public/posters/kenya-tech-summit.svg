<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1080">
  <defs>
    <linearGradient id="topScrim" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#000000" stop-opacity="0.65"/>
      <stop offset="1" stop-color="#000000" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="botScrim" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#000000" stop-opacity="0"/>
      <stop offset="0.55" stop-color="#000000" stop-opacity="0.78"/>
      <stop offset="1" stop-color="#000000" stop-opacity="0.92"/>
    </linearGradient>
    <clipPath id="frame"><rect x="0" y="0" width="1080" height="1080"/></clipPath>
  </defs>

  <g clip-path="url(#frame)">
    <image href="https://upload.wikimedia.org/wikipedia/commons/thumb/f/fb/Overnight_gaming_%26_LAN_party_at_iHub_Nairobi.jpg/1280px-Overnight_gaming_%26_LAN_party_at_iHub_Nairobi.jpg"
           x="-562" y="-572" width="2203" height="1652"/>
  </g>

  <rect width="1080" height="230" fill="url(#topScrim)"/>
  <rect y="470" width="1080" height="610" fill="url(#botScrim)"/>

  <!-- Category tag -->
  <rect x="60" y="56" width="290" height="56" rx="28" fill="#ffffff" opacity="0.15"/>
  <text x="205" y="93" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="700" letter-spacing="3" fill="#5eead4" text-anchor="middle">TECH &amp; INNOVATION</text>

  <!-- Title -->
  <text x="540" y="770" font-family="Arial, Helvetica, sans-serif" font-size="70" font-weight="900" fill="#ffffff" text-anchor="middle">KENYA TECH</text>
  <text x="540" y="840" font-family="Arial, Helvetica, sans-serif" font-size="70" font-weight="900" fill="#ffffff" text-anchor="middle">SUMMIT</text>
  <text x="540" y="880" font-family="Arial, Helvetica, sans-serif" font-size="28" font-weight="500" fill="#dbe7e3" text-anchor="middle">KICC &#8226; Nairobi, Kenya</text>

  <!-- Bottom brand bar -->
  <rect y="970" width="1080" height="110" fill="#be123c"/>
  <text x="60" y="1015" font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="700" letter-spacing="1" fill="#ffffff" opacity="0.85">TICKETS &amp; ENTRY</text>
  <text x="60" y="1048" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="700" fill="#ffffff">Book online now</text>

  <rect x="760" y="985" width="260" height="80" rx="14" fill="#ffffff"/>
  <image href="https://ticketflow-frontend-w47s.onrender.com/logo.png" x="772" y="993" width="236" height="64" preserveAspectRatio="xMidYMid meet"/>
</svg>
