databases:
  - name: ticketflow-db
    plan: free
    region: oregon
    databaseName: ticketflow_kenya
    user: ticketflow_user

services:
  - type: web
    name: ticketflow-backend
    runtime: node
    plan: free
    region: oregon
    rootDir: backend
    buildCommand: npm install && npx prisma generate && npm run build
    startCommand: npx prisma migrate deploy && npm run start:prod
    healthCheckPath: /api/health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: ticketflow-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 7d
      - key: PLATFORM_COMMISSION_PERCENT
        value: "9"
      - key: ENABLE_MOCK_PAYMENTS
        value: "false"
      - key: MPESA_ENV
        value: sandbox
      # Set these manually in the Render dashboard once you have Daraja sandbox/production credentials.
      - key: MPESA_CONSUMER_KEY
        sync: false
      - key: MPESA_CONSUMER_SECRET
        sync: false
      - key: MPESA_SHORTCODE
        sync: false
      - key: MPESA_PASSKEY
        sync: false
      # Set to the frontend service's public URL once it's deployed (used for CORS).
      - key: FRONTEND_URL
        sync: false
      # Set to https://<this-service>.onrender.com/payments/mpesa/callback once this service is deployed.
      - key: MPESA_CALLBACK_URL
        sync: false

  - type: web
    name: ticketflow-frontend
    runtime: node
    plan: free
    region: oregon
    rootDir: frontend
    buildCommand: npm install && npm run build
    startCommand: npm run start
    envVars:
      # Set to https://<ticketflow-backend>.onrender.com/api once the backend service is deployed.
      - key: NEXT_PUBLIC_API_URL
        sync: false
      # Buyer-facing service fee shown at checkout. Keep in sync with the backend's PLATFORM_COMMISSION_PERCENT.
      - key: NEXT_PUBLIC_SERVICE_FEE_PERCENT
        value: "9"
